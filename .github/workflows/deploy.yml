name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:          # déclenchement manuel depuis l'onglet Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Crée un dossier _site et y copie tous les fichiers HTML + assets
      - name: Build site
        run: |
          mkdir -p _site
          # Tous les HTML à la racine du repo → racine du site Pages
          find . -maxdepth 1 -name "*.html" -exec cp {} _site/ \;
          # Sous-dossiers éventuels (embeds organisés par date, etc.)
          for dir in embeds assets data; do
            [ -d "$dir" ] && cp -r "$dir" _site/ || true
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
